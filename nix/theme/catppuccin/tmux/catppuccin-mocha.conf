# --> Catppuccin (Mocha)
set -g @thm_bg "#1e1e2e"
set -g @thm_fg "#cdd6f4"

# Colors
set -g @thm_rosewater "#f5e0dc"
set -g @thm_flamingo "#f2cdcd"
set -g @thm_pink "#f5c2e7"
set -g @thm_mauve "#cba6f7"
set -g @thm_red "#f38ba8"
set -g @thm_maroon "#eba0ac"
set -g @thm_peach "#fab387"
set -g @thm_yellow "#f9e2af"
set -g @thm_green "#a6e3a1"
set -g @thm_teal "#94e2d5"
set -g @thm_sky "#89dceb"
set -g @thm_sapphire "#74c7ec"
set -g @thm_blue "#89b4fa"
set -g @thm_lavender "#b4befe"

# Surfaces and overlays
set -g @thm_subtext_1 "#bac2de"
set -g @thm_subtext_0 "#a6adc8"
set -g @thm_overlay_2 "#9399b2"
set -g @thm_overlay_1 "#7f849c"
set -g @thm_overlay_0 "#6c7086"
set -g @thm_surface_2 "#585b70"
set -g @thm_surface_1 "#45475a"
set -g @thm_surface_0 "#313244"
set -g @thm_mantle "#181825"
set -g @thm_crust "#11111b"

# Status bar
set -g status-style "bg=#{@thm_bg},fg=#{@thm_fg}"
set -g mode-style "bg=#{@thm_surface_2},fg=#{@thm_fg}"
set -g message-style "bg=#{@thm_surface_2},fg=#{@thm_fg}"

# Windows
set -g window-status-format "#[fg=#{@thm_fg},bg=#{@thm_bg}] #I #W "
set -g window-status-current-format "#[fg=#{@thm_blue},bg=#{@thm_surface_0},bold] #I #W "
set -g window-status-separator ""

# Panes
set -g pane-border-style "fg=#{@thm_overlay_2}"
set -g pane-active-border-style "fg=#{@thm_blue}"

# Messages and copy mode
set -g message-command-style "bg=#{@thm_surface_2},fg=#{@thm_fg}"
set -g copy-mode-match-style "bg=#{@thm_surface_2},fg=#{@thm_fg}"
set -g copy-mode-current-match-style "bg=#{@thm_surface_1},fg=#{@thm_fg}" 