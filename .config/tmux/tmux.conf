# ~/.config/tmux/tmux.conf

# ------------------ Terminal ------------------
set -g default-terminal "tmux-256color"

set -as terminal-features ",*:RGB"
# Undercurl (wavy underline) for (neo)vim diagnostics
set -as terminal-features ",*:usstyle"
# Fallback truecolor for tmux < 3.2
set -ga terminal-overrides ",*:Tc"

# ------------------ Prefix ------------------
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ------------------ Theme ------------------
if-shell '\
  case "$(uname -s)" in \
    Darwin) [ "$(defaults read -g AppleInterfaceStyle 2>/dev/null)" = "Dark" ] ;; \
    Linux)  gsettings get org.gnome.desktop.interface color-scheme 2>/dev/null | grep -q prefer-dark ;; \
    *)      false ;; \
  esac' \
  'source-file ~/.config/tmux/themes/mocha.conf' \
  'source-file ~/.config/tmux/themes/latte.conf'

# ------------------ Options ------------------
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on        # autoread (neo)vim + vim-tmux-navigator
set -g history-limit 1000000
set -g mouse on
set -g mode-keys vi
set -g set-clipboard on
set -g allow-passthrough on
set -g detach-on-destroy off
set -g status-interval 3

# ------------------ Splits / New window ------------------
unbind %
unbind '"'
bind b split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ------------------ Resize panes ------------------
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# ------------------ Copy mode (vi) ------------------
bind-key -T copy-mode-vi 'v'   send -X begin-selection
bind-key -T copy-mode-vi 'V'   send -X select-line
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi Escape send -X clear-selection

# Cross-platform copy command:
#   macOS         -> pbcopy
#   Linux Wayland -> wl-copy   (package wl-clipboard)
#   Linux X11    -> xclip
if-shell 'uname | grep -q Darwin' \
  'set -g @copy_cmd "pbcopy"' \
  'if-shell "[ -n \"$WAYLAND_DISPLAY\" ]" \
     "set -g @copy_cmd \"wl-copy\"" \
     "set -g @copy_cmd \"xclip -selection clipboard\""'

bind -T copy-mode-vi 'y'   send-keys -X copy-pipe-and-cancel "#{@copy_cmd}"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@copy_cmd}"

bind P paste-buffer
unbind -T copy-mode-vi MouseDragEnd1Pane

# ------------------ Swap windows ------------------
bind -r S-Left  run 'tmux swap-window -d -t #{e|-|:#I,1}'
bind -r S-Right run 'tmux swap-window -d -t #{e|+|:#I,1}'

# ------------------ Plugins ------------------
set -g @plugin 'tmux-plugins/tpm'
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor'

# ------------------ Resurrect ------------------
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# ------------------ Continuum ------------------
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ------------------ Status right ------------------
set -g status-right " #{cpu}   #{mem}  󱛟 #{disk -f}"


# ------------------ TPM (keep at bottom) ------------------
run '~/.config/tmux/plugins/tpm/tpm'
