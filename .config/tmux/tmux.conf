# ~/.config/tmux/tmux.conf

# prefix
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# theme (macOS + Linux)
if-shell 'case "$(uname -s)" in Darwin) [ "$(defaults read -g AppleInterfaceStyle 2>/dev/null)" = "Dark" ] ;; Linux) gsettings get org.gnome.desktop.interface color-scheme 2>/dev/null | grep -q prefer-dark ;; *) false ;; esac' \
    'source-file ~/.config/tmux/themes/mocha.conf' \
    'source-file ~/.config/tmux/themes/latte.conf'

# options
set-option -g default-shell $SHELL
set-option -g status-interval 5
set-option -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color*:Tc"
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g mouse on
set-option -g history-limit 50000
set-option -sg escape-time 0
set-option -g detach-on-destroy off
set-option -g set-clipboard on
set-option -g allow-passthrough on
set-option -g mode-keys vi

# keys
bind s split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# plugins (tpm run must stay last)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
run '~/.config/tmux/plugins/tpm/tpm'
