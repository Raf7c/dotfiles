# ==========================================
# ~/.config/tmux/themes/latte.conf
# Catppuccin Latte Theme
# ==========================================

set -g status-position top
set -g status-justify centre

# ------------------ Catppuccin Latte Palette ------------------
set -g @thm_bg        "#eff1f5"   # base
set -g @thm_fg        "#4c4f69"   # text
set -g @thm_green     "#40a02b"   # green
set -g @thm_blue      "#1e66f5"   # blue
set -g @thm_red       "#d20f39"   # red
set -g @thm_magenta   "#ea76cb"   # pink
set -g @thm_gray      "#9ca0b0"   # overlay0
set -g @thm_surface   "#ccd0da"   # surface0

# ------------------ Status bar ------------------
set -g status-style "bg=default,fg=#{@thm_fg}"

# Left: Session name
set -g status-left "#[fg=#{@thm_green},bold,bg=default] #S #[fg=#{@thm_gray},nobold,bg=default]"

# Window status
set -g window-status-format " #I#[fg=#{@thm_magenta}]:#[fg=default]#W "
set -g window-status-current-format "#[fg=#{@thm_gray},bg=default]#(printf '\ue0b6')#[bg=#{@thm_gray},fg=#{@thm_blue}]  #[fg=#{@thm_blue}]#I#[fg=#{@thm_red}]:#[fg=#{@thm_blue}]#W #[fg=#{@thm_gray},bg=default]#(printf '\ue0b4')"
set -g window-status-separator ""

# Right: User
#set -g status-right "#(whoami)"

# ------------------ Message / Mode ------------------
set -g message-style "bg=#{@thm_surface},fg=#{@thm_fg}"
set -g mode-style    "bg=#{@thm_blue},fg=#{@thm_bg}"

# ------------------ Pane borders ------------------
set -g pane-border-style        "fg=#{@thm_gray},bg=default"
set -g pane-active-border-style "fg=#{@thm_blue},bg=default"